name: NovaPulse
options:
  bundleIdPrefix: com.ryankaya
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  NovaPulse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NovaPulse
    info:
      path: NovaPulse/Resources/Info.plist
      properties:
        CFBundleDisplayName: NovaPulse
        NSHealthShareUsageDescription: "NovaPulse reads your heart rate, steps, sleep, blood oxygen, HRV, and calorie data to compute your Vitality Score and generate personalized biometric insights."
        NSHealthUpdateUsageDescription: "NovaPulse does not write health data."
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiredDeviceCapabilities:
          - arm64
    entitlements:
      path: NovaPulse/NovaPulse.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankaya.novapulse
        INFOPLIST_FILE: NovaPulse/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
